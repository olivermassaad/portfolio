{% extends "layout.html" %}

{% block title %}Projects — Oliver Massaad{% endblock %}

{% block content %}

<header class="page-header">
    <h1>Projects</h1>
    <p>AI-powered and full-stack applications from concept to deployment.</p>
</header>

<div class="card-grid">
    {% for project in projects %}
    <article class="card">
        <h2>{{ project.name }}</h2>
        <p>{{ project.description }}</p>
    </article>
    {% endfor %}
</div>

{% endblock %}
