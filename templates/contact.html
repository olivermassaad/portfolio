{% extends "layout.html" %}

{% block title %}Contact Me - Oliver Massaad{% endblock %}

{% block headscript %}
    <script src="{{url_for('static', filename='script.js')}}" defer></script>
{% endblock %}

{% block content %}

<form action="submit" method="POST">
    <h1>Contact Me</h1>
    <fieldset>
        <p>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
        </p>
        <p>
            <label for="Full Name">Full name</label>
            <input type="text" id="name" name="name" >
        </p>
        <p>
            <label for="message">Message:</label>
            <input type="text" id="message" name="message">
        </p>
        <button type="submit">Submit</button>
    </fieldset>
    <button type="button" id="githubbutton">Github</button>
    <button type="button" id="linkedinbutton">LinkedIn</button>
    <button onclick="navigator.clipboard.writeText('olimasad@gmail.com')" type="button" id="emailbutton">Email</button>
</form>

{% endblock %}
